name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin manifest
        run: |
          test -f .claude-plugin/plugin.json || { echo ".claude-plugin/plugin.json missing"; exit 1; }
          test -f .claude-plugin/marketplace.json || { echo ".claude-plugin/marketplace.json missing"; exit 1; }
          node -e "const p=JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); if(p.name!=='keepwright'){console.error('plugin.json name is not keepwright');process.exit(1)}"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))" || { echo "marketplace.json is not valid JSON"; exit 1; }

      - name: Check commands exist
        run: |
          for c in setup audit review; do
            test -f "commands/$c.md" || { echo "commands/$c.md missing"; exit 1; }
          done

      - name: Check skill exists with frontmatter
        run: |
          test -f skills/keepwright/SKILL.md || { echo "skills/keepwright/SKILL.md missing"; exit 1; }
          head -1 skills/keepwright/SKILL.md | grep -q "^---$" || { echo "SKILL.md missing frontmatter"; exit 1; }
          grep -q "^name: keepwright$" skills/keepwright/SKILL.md || { echo "SKILL.md frontmatter name missing"; exit 1; }
          grep -q "^description:" skills/keepwright/SKILL.md || { echo "SKILL.md frontmatter description missing"; exit 1; }

      - name: Check orchestration workflows exist
        run: |
          for w in map-brownfield derive-patterns verify-setup; do
            test -f "workflows/$w.js" || { echo "workflows/$w.js missing"; exit 1; }
          done

      - name: Check README.md exists
        run: test -f README.md

      - name: Check CHANGELOG.md exists
        run: test -f CHANGELOG.md

      - name: Check LICENSE exists
        run: test -f LICENSE

      - name: Verify all expected templates exist
        run: |
          REQUIRED=(
            "templates/CLAUDE.md.template"
            "templates/settings.json.template"
            "templates/lefthook.yml.template"
            "templates/PULL_REQUEST_TEMPLATE.md.template"
            "templates/REVIEW.md.template"
            "templates/rules/01-invariants.md.template"
            "templates/rules/02-pipeline-equalization.md.template"
            "templates/rules/03-epistemic-hierarchy.md.template"
            "templates/rules/04-pr-flow.md.template"
            "templates/rules/05-lesson-cataloging.md.template"
            "templates/rules/06-parallel-workstreams.md.template"
            "templates/rules/07-safe-merge.md.template"
            "templates/rules/08-empirical-proof.md.template"
            "templates/agents/worker.md.template"
            "templates/workflows/ci.yml.template"
            "templates/workflows/pr-auto-review.yml.template"
            "templates/workflows/claude-mention.yml.template"
            "templates/workflows/pr-auto-merge.yml.template"
            "templates/workflows/deploy/vercel.yml.template"
            "templates/workflows/deploy/supabase-functions.yml.template"
            "templates/workflows/deploy/docker-ghcr.yml.template"
            "templates/workflows/deploy/npm-publish.yml.template"
            "templates/workflows/deploy/static-pages.yml.template"
            "templates/validators/validate-no-secrets.ts.template"
            "templates/validators/validate-claude-md-sync.ts.template"
            "templates/validators/validate-epistemic-hierarchy.ts.template"
            "templates/validators/validate-empirical-proof.ts.template"
            "templates/validators/validate-webhook-active.ts.template"
            "templates/hooks/gen-project-structure.ts.template"
            "templates/hooks/gen-todos-report.ts.template"
            "templates/scripts/gh-pr-merge-safe.sh.template"
            "templates/scripts/setup-oauth-secret.sh.template"
            "templates/scripts/setup-self-hosted-runner.sh.template"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "$MISSING templates missing"
            exit 1
          fi
          echo "All ${#REQUIRED[@]} templates present"

      - name: No secrets committed
        run: |
          set -e
          PATTERNS=(
            "pk_live_[A-Za-z0-9]{20,}"
            "sk_live_[A-Za-z0-9]{20,}"
            "sbp_[a-f0-9]{40}"
            "ghp_[A-Za-z0-9]{36}"
            "sk-ant-api[0-9]+-[A-Za-z0-9_-]+"
            "sk-ant-oat01-[A-Za-z0-9_-]+"
            "EAA[A-Za-z0-9]{60,}"
          )
          FOUND=0
          for pat in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rEn "$pat" --include="*.md" --include="*.ts" --include="*.yml" --include="*.json" --include="*.sh" --include="*.template" --exclude-dir=node_modules --exclude-dir=.git . || true)
            if [ -n "$MATCHES" ]; then
              echo "Secret pattern matched: $pat"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ $FOUND -gt 0 ]; then exit 1; fi
          echo "No secrets detected"
